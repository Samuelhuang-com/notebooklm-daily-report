name: 投資日報自動分析

on:
  schedule:
    - cron: "0,30 * * * *"

  workflow_dispatch:
    inputs:
      job_id:
        description: "執行指定任務 ID（留空=執行所有到時間的任務）"
        required: false
        default: ""
      command_override:
        description: "臨時分析指令（留空=使用 config.yaml 設定）"
        required: false
        default: ""

jobs:
  run-analysis:
    name: 執行投資分析
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements_headless.txt

      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements_headless.txt

      - name: 🌐 Install Playwright Chromium
        run: |
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: 🚀 執行分析
        env:
          YOUTUBE_API_KEY:    ${{ secrets.YOUTUBE_API_KEY }}
          NOTEBOOK_ID:        ${{ secrets.NOTEBOOK_ID }}
          STORAGE_STATE_B64:  ${{ secrets.STORAGE_STATE_B64 }}
          EMAIL_TO:           ${{ secrets.EMAIL_TO }}
          EMAIL_FROM:         ${{ secrets.EMAIL_FROM }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          LINE_NOTIFY_TOKEN:  ${{ secrets.LINE_NOTIFY_TOKEN }}
          GDRIVE_SA_JSON_B64: ${{ secrets.GDRIVE_SA_JSON_B64 }}
          GDRIVE_FOLDER_ID:   ${{ secrets.GDRIVE_FOLDER_ID }}
          JOB_ID:             ${{ github.event.inputs.job_id }}
          ANALYSIS_COMMAND:   ${{ github.event.inputs.command_override }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        run: |
          if [ -n "$JOB_ID" ]; then
            echo "手動執行任務：$JOB_ID"
            python headless_runner.py --job-id "$JOB_ID"
          else
            echo "自動模式：依排程判斷"
            python headless_runner.py
          fi

      - name: 📤 Upload HTML reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-${{ github.run_id }}
          path: outputs/**/*.html
          retention-days: 30
          if-no-files-found: ignore

      - name: ❌ 失敗 LINE 通知
        if: failure()
        env:
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        run: |
          if [ -n "$LINE_NOTIFY_TOKEN" ]; then
            curl -s -X POST https://notify-api.line.me/api/notify \
              -H "Authorization: Bearer $LINE_NOTIFY_TOKEN" \
              -d "message=%0A%E2%9D%8C%20%E6%8A%95%E8%B3%87%E6%97%A5%E5%A0%B1%E5%9F%B7%E8%A1%8C%E5%A4%B1%E6%95%97%0A%E4%BB%BB%E5%8B%99%EF%BC%9A${JOB_ID:-%E8%87%AA%E5%8B%95}%0A%E6%9F%A5%E7%9C%8B%EF%BC%9Ahttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

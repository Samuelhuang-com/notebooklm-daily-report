
# =============================================================================
# config.yaml – 投資日報設定檔
# =============================================================================
# 這個檔案控制所有「常常需要修改」的設定。
# 機密資料（API Key / 密碼 / Cookie）請繼續放在 GitHub Secrets，
# 不要寫在這個檔案裡。
#
# 修改方式：
#   GitHub 倉庫 → config.yaml → 點右上角鉛筆圖示 → 修改 → Commit changes
# =============================================================================

# ── 分析指令 ─────────────────────────────────────────────────────────────────
# 「｜」前面是 YouTube 搜尋關鍵字，後面是 NotebookLM 分析要求
analysis_command: |
  台股 美股 ETF 投資 財經｜
  請整理今天最熱門的投資影片，重點萃取：
  1. 提到的股票代號、ETF代號、目標價、支撐壓力位
  2. 博主觀點與市場共識分歧
  3. 每支影片的核心論點（1-2句）
  4. 播放量特別高的原因（標題策略、發布時機、獨家資訊）
  輸出格式：先給5-8點摘要重點，再給來源影片表格，最後給股票/ETF彙整表

# ── YouTube 搜尋設定 ──────────────────────────────────────────────────────────
youtube:
  top_n: 10              # 關鍵字搜尋最多取幾支影片
  region_code: "TW"      # 地區代碼
  language: "zh-Hant"    # 搜尋語言
  min_minutes: 0         # 最短片長（0 = 不限制）
  exclude_shorts: true   # 是否排除 YouTube Shorts（≤60秒）

  # 搜尋時間窗口：往前幾小時
  # 預設 21 = 昨天 12:00 到今天 09:00（配合每天 09:00 執行）
  # 若改為每天 08:00 執行，可改成 20
  search_hours_back: 21

  # 固定追蹤的 YouTuber 頻道（每天都會抓這些頻道的最新影片）
  # 一行一個，可以是：
  #   - 完整頻道網址：https://www.youtube.com/@imoneytalk
  #   - @handle：@imoneytalk
  fixed_channels:
    - "https://www.youtube.com/@早見說財經"
    # 在下面新增更多頻道，取消 # 號即可：
    # - "https://www.youtube.com/@imoneytalk"
    # - "https://www.youtube.com/@股癌"
    # - "https://www.youtube.com/@MoneyDJ理財網"
    # - "@財報狗"

  # 每個固定頻道最多抓幾支（避免單一頻道佔太多）
  channel_videos_per: 3

# ── 投資報價 ─────────────────────────────────────────────────────────────────
prices:
  # 額外要查詢的投資代號（除了從分析指令自動偵測的之外）
  # 台股：4-6位數字（系統自動加 .TW）
  # 美股：英文代號
  # 商品：GC=F（黃金）、CL=F（原油）、SI=F（白銀）
  # 指數：^TWII（台灣加權）、^GSPC（S&P500）、^IXIC（NASDAQ）
  extra_tickers:
    - "2330"      # 台積電
    - "0050"      # 元大台灣50
    - "00878"     # 國泰高股息
    - "^TWII"     # 台灣加權指數
    - "^GSPC"     # S&P 500
    - "GC=F"      # 黃金期貨
    # - "NVDA"    # 輝達（取消 # 號即可加入）
    # - "CL=F"    # WTI 原油

# ── 排程設定 ─────────────────────────────────────────────────────────────────
schedule:
  # Cron 格式（UTC 時間）
  # 台北時間 09:00 = UTC 01:00
  # 台北時間 08:00 = UTC 00:00
  # 只有週一到週五執行（交易日）
  cron: "0 1 * * 1-5"

  # 若要改成每天（含週末）：
  # cron: "0 1 * * *"

# ── NotebookLM 設定 ───────────────────────────────────────────────────────────
notebooklm:
  # Infographic 語言設定
  infographic_language: "zh_Hant"
  infographic_instructions: |
    請用繁體中文生成資訊圖表。
    風格清楚、商業報告感，適合主管閱讀。
    重點包含：股票/ETF彙整、博主共識、風險警示。

# ── Email 報告設定 ────────────────────────────────────────────────────────────
report:
  # 報告標題前綴
  subject_prefix: "📊 投資分析日報"

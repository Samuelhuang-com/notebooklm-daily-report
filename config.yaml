# =============================================================================
# config.yaml – 投資日報設定檔（多任務版）
# =============================================================================
# 修改方式：
#   Web 控制台 → 任意分頁修改 → 點「💾 儲存到 GitHub」
#
# 重要：機密資料（API Key / 密碼 / Cookie）請放 GitHub Secrets，不要寫在這裡
# =============================================================================

defaults:
  region_code: "TW"
  language: "zh-Hant"
  min_minutes: 0
  exclude_shorts: true
  channel_videos_per: 3
  top_n: 10

jobs:

  - id: morning_tw
    name: "🌅 台股早報"
    enabled: true
    schedule: "0 1 * * 1-5"
    search_hours_back: 21
    analysis_command: |
      台股 美股 ETF 投資 財經｜
      請整理今天最熱門的投資影片，重點萃取：
      1. 提到的股票代號、ETF代號、目標價、支撐壓力位
      2. 博主觀點與市場共識分歧
      3. 每支影片的核心論點（1-2句）
      4. 播放量特別高的原因（標題策略、發布時機、獨家資訊）
      輸出格式：先給5-8點摘要重點，再給來源影片表格，最後給股票/ETF彙整表
    youtube:
      top_n: 10
      fixed_channels:
        - "https://www.youtube.com/@早見說財經"
      channel_videos_per: 3
    prices:
      extra_tickers:
        - "2330"
        - "0050"
        - "00878"
        - "^TWII"
        - "^GSPC"
        - "GC=F"

  - id: evening_us
    name: "🌃 美股晚報"
    enabled: false
    schedule: "0 13 * * 1-5"
    search_hours_back: 10
    analysis_command: |
      美股 NASDAQ 科技股 AI 半導體｜
      分析今天美股收盤後的熱門討論影片
    youtube:
      top_n: 8
      fixed_channels: []
      channel_videos_per: 3
    prices:
      extra_tickers:
        - "NVDA"
        - "AAPL"
        - "^GSPC"
        - "^IXIC"

  - id: weekly_summary
    name: "📊 週五週報"
    enabled: false
    schedule: "0 10 * * 5"
    search_hours_back: 120
    analysis_command: |
      台股 美股 ETF 投資 財經 黃金 原油｜
      整理本週投資重點
    youtube:
      top_n: 15
      fixed_channels:
        - "https://www.youtube.com/@早見說財經"
      channel_videos_per: 5
    prices:
      extra_tickers:
        - "2330"
        - "0050"
        - "^TWII"
        - "^GSPC"
        - "GC=F"

report:
  subject_prefix: "📊 投資分析日報"

notebooklm:
  infographic_language: "zh_Hant"
  infographic_instructions: |
    請用繁體中文生成資訊圖表。
    風格清楚、商業報告感，適合主管閱讀。
    重點包含：股票/ETF彙整、博主共識、風險警示。

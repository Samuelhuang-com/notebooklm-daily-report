<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Excel 完整教學課程</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --green: #1b4332;
        --green-mid: #2d6a4f;
        --green-light: #d8f3dc;
        --amber: #e9a825;
        --amber-light: #fef9ee;
        --bg: #f7f6f2;
        --surface: #ffffff;
        --border: #e4e2dc;
        --text: #1a1a18;
        --muted: #6b6b63;
        --r: 12px;
        --shadow: 0 2px 16px rgba(0, 0, 0, 0.07);
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "DM Sans", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.6;
        min-height: 100vh;
      }
      h1,
      h2,
      h3 {
        font-family: "Playfair Display", Georgia, serif;
        font-weight: 700;
        line-height: 1.25;
      }

      /* NAV */
      nav {
        background: var(--green);
        padding: 0 28px;
        display: flex;
        align-items: center;
        gap: 0;
        height: 56px;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .nav-brand {
        color: #fff;
        font-family: "Playfair Display", serif;
        font-size: 18px;
        font-weight: 700;
        cursor: pointer;
        letter-spacing: -0.3px;
      }
      .nav-brand span {
        color: var(--amber);
      }
      .breadcrumb {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-left: 20px;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.6);
      }
      .breadcrumb .sep {
        opacity: 0.4;
      }
      .breadcrumb .crumb {
        color: rgba(255, 255, 255, 0.8);
        cursor: pointer;
      }
      .breadcrumb .crumb:hover {
        color: #fff;
      }
      .breadcrumb .current {
        color: #fff;
        font-weight: 500;
      }

      /* VIEWS */
      .view {
        display: none;
        animation: fadeIn 0.3s ease;
      }
      .view.active {
        display: block;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ========== HOME VIEW ========== */
      .hero {
        background: linear-gradient(
          135deg,
          var(--green) 0%,
          var(--green-mid) 100%
        );
        padding: 60px 40px 56px;
        color: #fff;
        position: relative;
        overflow: hidden;
      }
      .hero::before {
        content: "";
        position: absolute;
        right: -60px;
        top: -60px;
        width: 320px;
        height: 320px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.04);
      }
      .hero::after {
        content: "";
        position: absolute;
        right: 80px;
        bottom: -80px;
        width: 200px;
        height: 200px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.03);
      }
      .hero-inner {
        max-width: 800px;
        position: relative;
      }
      .hero-tag {
        display: inline-block;
        background: rgba(233, 168, 37, 0.2);
        color: var(--amber);
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 1px;
        text-transform: uppercase;
        padding: 5px 12px;
        border-radius: 20px;
        margin-bottom: 16px;
        border: 1px solid rgba(233, 168, 37, 0.3);
      }
      .hero h1 {
        font-size: 36px;
        margin-bottom: 12px;
        letter-spacing: -0.5px;
      }
      .hero p {
        font-size: 16px;
        color: rgba(255, 255, 255, 0.75);
        max-width: 520px;
      }
      .stats-row {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 14px;
        padding: 28px 40px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
      }
      .stat-box {
        text-align: center;
        padding: 14px;
      }
      .stat-n {
        font-size: 32px;
        font-weight: 700;
        font-family: "Playfair Display", serif;
        color: var(--green);
        line-height: 1;
      }
      .stat-l {
        font-size: 12px;
        color: var(--muted);
        margin-top: 4px;
        letter-spacing: 0.3px;
      }

      .page-inner {
        max-width: 960px;
        margin: 0 auto;
        padding: 40px 28px;
      }
      .section-title {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 20px;
      }

      .mod-grid {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .mod-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--r);
        overflow: hidden;
        cursor: pointer;
        transition:
          box-shadow 0.2s,
          transform 0.15s;
      }
      .mod-card:hover {
        box-shadow: var(--shadow);
        transform: translateY(-1px);
      }
      .mod-card-head {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 18px 20px;
      }
      .mod-num {
        width: 42px;
        height: 42px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        font-weight: 700;
        flex-shrink: 0;
        letter-spacing: -0.5px;
      }
      .mod-info {
        flex: 1;
      }
      .mod-title {
        font-size: 15px;
        font-weight: 600;
        color: var(--text);
        font-family: "Playfair Display", serif;
      }
      .mod-sub {
        font-size: 12px;
        color: var(--muted);
        margin-top: 3px;
      }
      .mod-right {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
      }
      .level-badge {
        font-size: 11px;
        font-weight: 600;
        padding: 3px 10px;
        border-radius: 20px;
        letter-spacing: 0.3px;
      }
      .mod-arrow {
        color: var(--muted);
        font-size: 18px;
        transition: transform 0.2s;
      }
      .mod-card:hover .mod-arrow {
        transform: translateX(3px);
      }
      .func-preview {
        padding: 0 20px 16px;
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        border-top: 1px solid var(--border);
        padding-top: 12px;
      }
      .func-chip {
        font-size: 11px;
        font-family: monospace;
        padding: 3px 8px;
        border-radius: 6px;
        font-weight: 500;
        letter-spacing: 0.3px;
      }

      /* MODULE COLORS */
      .c1 {
        background: #dbeafe;
        color: #1e3a8a;
      }
      .c2 {
        background: #dcfce7;
        color: #14532d;
      }
      .c3 {
        background: #fef9c3;
        color: #78350f;
      }
      .c4 {
        background: #ede9fe;
        color: #4c1d95;
      }
      .c5 {
        background: #fce7f3;
        color: #831843;
      }
      .c6 {
        background: #ccfbf1;
        color: #134e4a;
      }
      .c7 {
        background: #ffedd5;
        color: #7c2d12;
      }
      .c8 {
        background: #e0e7ff;
        color: #3730a3;
      }
      .c9 {
        background: #fee2e2;
        color: #7f1d1d;
      }
      .c10 {
        background: #d1fae5;
        color: #064e3b;
      }

      .lv-0 {
        background: #dbeafe;
        color: #1e40af;
      }
      .lv-1 {
        background: #dcfce7;
        color: #166534;
      }
      .lv-2 {
        background: #fef9c3;
        color: #92400e;
      }
      .lv-3 {
        background: #ede9fe;
        color: #5b21b6;
      }

      /* ========== MODULE VIEW ========== */
      .mod-hero {
        padding: 36px 40px;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
      }
      .mod-hero-inner {
        max-width: 960px;
        margin: 0 auto;
        display: flex;
        gap: 20px;
        align-items: flex-start;
      }
      .mod-icon-big {
        width: 56px;
        height: 56px;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        font-weight: 800;
        flex-shrink: 0;
      }
      .mod-hero h2 {
        font-size: 26px;
        color: var(--text);
        margin-bottom: 6px;
      }
      .mod-hero .desc {
        font-size: 14px;
        color: var(--muted);
        max-width: 600px;
      }
      .mod-meta-pills {
        display: flex;
        gap: 8px;
        margin-top: 12px;
        flex-wrap: wrap;
      }
      .pill {
        font-size: 12px;
        padding: 4px 12px;
        border-radius: 20px;
        background: var(--bg);
        border: 1px solid var(--border);
        color: var(--muted);
      }

      .lesson-list {
        max-width: 960px;
        margin: 0 auto;
        padding: 32px 28px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .lesson-row {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--r);
        overflow: hidden;
      }
      .lesson-head {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 16px 20px;
        cursor: pointer;
        transition: background 0.15s;
      }
      .lesson-head:hover {
        background: #fafaf8;
      }
      .lesson-num-badge {
        width: 34px;
        height: 34px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 700;
        flex-shrink: 0;
      }
      .lesson-title-wrap {
        flex: 1;
      }
      .lesson-title {
        font-size: 14px;
        font-weight: 600;
        color: var(--text);
      }
      .lesson-funcs-row {
        display: flex;
        gap: 4px;
        margin-top: 4px;
        flex-wrap: wrap;
      }
      .lesson-func-tag {
        font-size: 10px;
        font-family: monospace;
        padding: 2px 6px;
        border-radius: 4px;
        font-weight: 600;
      }
      .lesson-expand-icon {
        font-size: 16px;
        color: var(--muted);
        transition: transform 0.25s;
        flex-shrink: 0;
      }
      .lesson-row.open .lesson-expand-icon {
        transform: rotate(180deg);
      }
      .lesson-body {
        display: none;
        border-top: 1px solid var(--border);
        background: #fafaf8;
      }
      .lesson-row.open .lesson-body {
        display: block;
      }

      .view-card-btn {
        margin: 0 20px 16px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 16px;
        background: var(--green);
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.15s;
      }
      .view-card-btn:hover {
        background: var(--green-mid);
      }

      .plan-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1px;
        background: var(--border);
        margin: 0 20px 20px;
      }
      .plan-cell {
        background: #fafaf8;
        padding: 14px 16px;
      }
      .plan-cell h5 {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 8px;
      }
      .plan-cell ul {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      .plan-cell ul li {
        font-size: 13px;
        color: var(--text);
        display: flex;
        gap: 8px;
        align-items: flex-start;
      }
      .plan-cell ul li::before {
        content: "·";
        color: var(--amber);
        font-weight: 700;
        flex-shrink: 0;
        margin-top: 1px;
      }
      .plan-cell.wide {
        grid-column: 1/-1;
      }
      .formula-display {
        background: var(--green);
        color: #86efac;
        font-family: monospace;
        font-size: 13px;
        padding: 10px 14px;
        border-radius: 8px;
        margin: 8px 0;
        display: block;
      }

      /* ========== CARD VIEW ========== */
      .card-view-wrap {
        max-width: 700px;
        margin: 0 auto;
        padding: 36px 24px;
      }
      .teaching-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        overflow: hidden;
        box-shadow: var(--shadow);
      }
      .card-header {
        padding: 28px 28px 24px;
        position: relative;
        overflow: hidden;
      }
      .card-header::before {
        content: "";
        position: absolute;
        right: -40px;
        top: -40px;
        width: 160px;
        height: 160px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.12);
      }
      .card-header-top {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 14px;
      }
      .card-lesson-id {
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.5px;
        opacity: 0.8;
      }
      .card-level-tag {
        font-size: 11px;
        padding: 3px 10px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.2);
        font-weight: 600;
      }
      .card-func-name {
        font-size: 42px;
        font-family: "Playfair Display", serif;
        font-weight: 700;
        color: #fff;
        line-height: 1;
        letter-spacing: -1px;
        margin-bottom: 6px;
      }
      .card-func-subtitle {
        font-size: 14px;
        color: rgba(255, 255, 255, 0.8);
        font-weight: 400;
      }

      .card-body {
        padding: 0;
      }
      .card-section {
        padding: 20px 24px;
        border-bottom: 1px solid var(--border);
      }
      .card-section:last-child {
        border-bottom: none;
      }
      .card-section-label {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 1.2px;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .card-section-label span {
        font-size: 14px;
      }
      .tagline-box {
        background: var(--amber-light);
        border: 1px solid rgba(233, 168, 37, 0.2);
        border-radius: 10px;
        padding: 14px 16px;
      }
      .tagline-box p {
        font-size: 15px;
        color: #78350f;
        font-weight: 500;
        line-height: 1.5;
      }
      .syntax-box {
        background: var(--green);
        color: #86efac;
        font-family: monospace;
        font-size: 14px;
        padding: 14px 18px;
        border-radius: 10px;
        line-height: 1.8;
      }
      .syntax-box .param {
        color: #fde68a;
      }
      .syntax-box .opt {
        color: #a7f3d0;
        opacity: 0.7;
      }
      .example-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
        margin-top: 8px;
      }
      .example-table th {
        background: var(--bg);
        padding: 7px 12px;
        text-align: left;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.5px;
        color: var(--muted);
        border: 1px solid var(--border);
      }
      .example-table td {
        padding: 7px 12px;
        border: 1px solid var(--border);
        color: var(--text);
      }
      .example-table tr:hover td {
        background: #fafaf8;
      }
      .highlight-cell {
        background: #fef9c3 !important;
        font-weight: 600;
        color: #92400e !important;
      }
      .formula-result {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 12px;
        flex-wrap: wrap;
      }
      .formula-code {
        background: var(--green);
        color: #86efac;
        font-family: monospace;
        font-size: 13px;
        padding: 8px 14px;
        border-radius: 8px;
        display: inline-block;
      }
      .formula-arrow {
        color: var(--muted);
        font-size: 16px;
      }
      .formula-val {
        font-size: 15px;
        font-weight: 700;
        color: var(--green);
        background: var(--green-light);
        padding: 6px 14px;
        border-radius: 8px;
      }

      .tips-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .tip-box {
        border-radius: 10px;
        padding: 12px 14px;
      }
      .tip-box.good {
        background: #f0fdf4;
        border: 1px solid #bbf7d0;
      }
      .tip-box.bad {
        background: #fef2f2;
        border: 1px solid #fecaca;
      }
      .tip-box h6 {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        margin-bottom: 7px;
      }
      .tip-box.good h6 {
        color: #15803d;
      }
      .tip-box.bad h6 {
        color: #dc2626;
      }
      .tip-box ul {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      .tip-box ul li {
        font-size: 12px;
        line-height: 1.5;
        display: flex;
        gap: 6px;
      }
      .tip-box.good ul li::before {
        content: "✓";
        color: #16a34a;
        font-weight: 700;
        flex-shrink: 0;
      }
      .tip-box.bad ul li::before {
        content: "✗";
        color: #dc2626;
        font-weight: 700;
        flex-shrink: 0;
      }

      .card-nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px 24px;
        border-top: 1px solid var(--border);
        background: var(--bg);
      }
      .card-nav-btn {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 16px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--surface);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        color: var(--text);
        transition: all 0.15s;
      }
      .card-nav-btn:hover {
        background: var(--green);
        color: #fff;
        border-color: var(--green);
      }
      .card-nav-btn:disabled {
        opacity: 0.35;
        pointer-events: none;
      }

      /* PROGRESS BAR */
      .progress-bar-wrap {
        background: var(--bg);
        padding: 16px 40px;
        border-bottom: 1px solid var(--border);
      }
      .progress-inner {
        max-width: 960px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .progress-label {
        font-size: 12px;
        color: var(--muted);
        flex-shrink: 0;
      }
      .progress-track {
        flex: 1;
        height: 4px;
        background: var(--border);
        border-radius: 2px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        background: var(--green);
        border-radius: 2px;
        transition: width 0.3s;
      }
      .progress-count {
        font-size: 12px;
        color: var(--muted);
        flex-shrink: 0;
      }

      /* RESPONSIVE */
      @media (max-width: 600px) {
        .hero {
          padding: 40px 20px;
        }
        .hero h1 {
          font-size: 26px;
        }
        .stats-row {
          grid-template-columns: 1fr 1fr;
          padding: 16px 20px;
        }
        .page-inner {
          padding: 24px 16px;
        }
        .tips-grid {
          grid-template-columns: 1fr;
        }
        .plan-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <nav>
      <span class="nav-brand" onclick="goHome()">Excel<span>課程</span></span>
      <div class="breadcrumb" id="breadcrumb"></div>
    </nav>

    <!-- ======== HOME VIEW ======== -->
    <div class="view active" id="view-home">
      <div class="hero">
        <div class="hero-inner">
          <div class="hero-tag">完整教學課程</div>
          <h1>Excel 基礎到進階<br />完整教學課程</h1>
          <p>
            依素材彙整分類，從零開始系統化學習，告別死記硬背，職場效率大升級
          </p>
        </div>
      </div>
      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-n">10</div>
          <div class="stat-l">大模組</div>
        </div>
        <div class="stat-box">
          <div class="stat-n">43</div>
          <div class="stat-l">課程單元</div>
        </div>
        <div class="stat-box">
          <div class="stat-n">51</div>
          <div class="stat-l">函數涵蓋</div>
        </div>
        <div class="stat-box">
          <div class="stat-n">4</div>
          <div class="stat-l">難度等級</div>
        </div>
      </div>
      <div class="page-inner">
        <div class="section-title">課程模組總覽</div>
        <div class="mod-grid" id="mod-grid"></div>
      </div>
    </div>

    <!-- ======== MODULE VIEW ======== -->
    <div class="view" id="view-module">
      <div class="mod-hero" id="mod-hero"></div>

    <script>
      const MODULES = [
        {
          id: 1,
          emoji: "📐",
          title: "函數入門：讀懂公式的底層邏輯",
          subtitle: "打好地基，告別死背",
          level: "入門",
          lvIdx: 0,
          color: "#1e3a8a",
          bg: "#dbeafe",
          chipCls: "c1",
          funcs: [],
          desc: "從最基礎的公式結構開始，理解函數的參數、邏輯與嵌套，培養讀懂任何公式的能力。",
          lessons: [
            {
              id: "1.1",
              title: "什麼是函數？公式結構拆解",
              funcs: [],
              tagline:
                "函數是Excel內建的計算工具，就像餐廳的固定套餐——只要告訴它你要什麼，它自動幫你做好。",
              syntax: "= 函數名稱（參數1，參數2，...）",
              points: [
                "公式必須以 = 開頭",
                "括號必須成對出現",
                "參數之間用英文逗號分隔",
                "函數名稱不區分大小寫",
              ],
              traps: [
                "忘記等號直接輸入文字",
                "中英文括號混用",
                "逗號用了中文全形逗號",
              ],
              ex: {
                desc: "計算A1到A10的總和",
                formula: "=SUM(A1:A10)",
                result: "300",
                table: {
                  cols: ["儲存格", "數值"],
                  rows: [
                    ["A1", "50"],
                    ["A2", "80"],
                    ["A3", "170"],
                    ["...", "..."],
                    ["合計", "=SUM(A1:A10) → 300"],
                  ],
                },
              },
              keys: [
                "公式結構 = 函數名稱 + 括號 + 參數",
                "參數之間用逗號分隔",
                "必要參數 vs 可選參數（可選的會用中括號[]標記）",
              ],
            },
            {
              id: "1.2",
              title: "函數拆解6招萬能法",
              funcs: ["參數", "邏輯", "引用", "嵌套"],
              tagline:
                "學會拆解比死背更重要。任何複雜函數，都是由「參數、邏輯、引用、嵌套」四個核心概念組成。",
              syntax: "=SUMIF( Range, Criteria, [Sum_range] )",
              points: [
                "第1招：識別函數參數個數",
                "第2招：理解每個參數的含義",
                "第3招：搞清楚引用是絕對還是相對",
                "第4招：從內往外拆解嵌套",
                "第5招：先用簡單數據測試",
                "第6招：對比結果驗證邏輯",
              ],
              traps: ["嵌套太深一次寫完容易錯", "沒有先確認參數順序就亂填"],
              ex: {
                desc: "拆解 SUMIF 函數",
                formula: '=SUMIF(A:A,"蘋果",B:B)',
                result: "20",
                table: {
                  cols: ["A(商品)", "B(金額)"],
                  rows: [
                    ["蘋果", "10"],
                    ["香蕉", "20"],
                    ["蘋果", "10"],
                    ["合計蘋果", "→ 20"],
                  ],
                },
              },
              keys: [
                "從最簡單的形式開始理解",
                "先拆開每個參數看懂再組合",
                "遇到複雜公式先拆解再重組",
              ],
            },
            {
              id: "1.3",
              title: "常見錯誤代碼全解析",
              funcs: ["#N/A", "#VALUE!", "#REF!", "#SPILL!", "#CALC!"],
              tagline: "看到紅色錯誤別怕！每個錯誤都是線索，認識它才能修正它。",
              syntax: "各種錯誤類型有不同原因",
              points: [
                "#N/A：查找不到結果（VLOOKUP找不到值）",
                "#VALUE!：數值和文字格式混用",
                "#REF!：引用的儲存格被刪除了",
                "#SPILL!：動態陣列溢出路徑被占用",
                "#NAME?：函數名稱打錯了",
                "#DIV/0!：分母為零",
                "#CALC!：動態函數找不到匹配數據",
              ],
              traps: [
                "VLOOKUP找不到值不代表數據不存在，可能是格式問題",
                "#SPILL!清空相鄰儲存格即可解決",
              ],
              ex: {
                desc: "IFERROR 包裹任何函數消除錯誤",
                formula: '=IFERROR(VLOOKUP(A2,Sheet2!A:B,2,0),"未找到")',
                result: '"未找到"',
                table: {
                  cols: ["查找值", "結果"],
                  rows: [
                    ["1001", "張三（找到）"],
                    ["1003", "未找到（IFERROR捕捉）"],
                  ],
                },
              },
              keys: [
                "#N/A 用 IFERROR 或 IFNA 包裹",
                "#VALUE! 檢查格式是否一致",
                "#SPILL! 清空溢出路徑的儲存格",
              ],
            },
            {
              id: "1.4",
              title: "數字格式 vs 文字格式陷阱",
              funcs: ["VALUE", "TEXT"],
              tagline:
                "明明看起來一樣，為什麼查不到？因為一個是數字，一個是偽裝成數字的文字！",
              syntax:
                '=VALUE(文字格式的數字)  →  轉回數字\n=TEXT(數字,"0")  →  轉成文字',
              points: [
                "數字靠右對齊，文字靠左對齊",
                "儲存格左上角有綠色小三角代表文字格式的數字",
                "SUM忽略文字格式，VLOOKUP也查不到",
                "用VALUE()轉換，或用—(負負得正)技巧",
              ],
              traps: ["從系統匯出的數據最常有這個問題", "日期也可能是文字格式"],
              ex: {
                desc: "識別文字vs數字格式",
                formula: "=VALUE(A2)",
                result: "1001（真正的數字）",
                table: {
                  cols: ["儲存格", "樣子", "實際格式", "對齊方式"],
                  rows: [
                    ["A1", "1001", "數字", "靠右"],
                    ["A2", "'1001", "文字", "靠左"],
                    ["VLOOKUP結果", "查1001", "→ A1找到", "A2找不到"],
                  ],
                },
              },
              keys: [
                "遇到查找失敗先檢查格式",
                "善用VALUE()轉換函數",
                "儲存格格式設定也要統一",
              ],
            },
          ],
        },
        {
          id: 2,
          emoji: "🧮",
          title: "求和與計數：數字統計核心函數",
          subtitle: "SUM / SUMIF / SUMIFS / COUNT 全家桶",
          level: "基礎",
          lvIdx: 1,
          color: "#14532d",
          bg: "#dcfce7",
          chipCls: "c2",
          funcs: [
            "SUM",
            "SUMIF",
            "SUMIFS",
            "COUNT",
            "COUNTA",
            "COUNTBLANK",
            "COUNTIF",
            "COUNTIFS",
            "AVERAGE",
            "AVERAGEIFS",
            "SUMPRODUCT",
            "SUBTOTAL",
          ],
          desc: "掌握統計數字的核心函數，從基礎求和到多條件篩選，讓數字分析變得簡單又精準。",
          lessons: [
            {
              id: "2.1",
              title: "SUM 全面解析：不只是加法",
              funcs: ["SUM", "SUBTOTAL"],
              tagline:
                "SUM 是「抓娃娃機」——無論可不可見，全部抓！SUBTOTAL 是透視眼——只加看得見的。",
              syntax: "=SUM(數值1, [數值2], ...)\n=SUBTOTAL(9, 範圍)",
              points: [
                "SUM 忽略文字，只加數字",
                "SUM vs 加號：SUM更安全不怕文字干擾",
                "篩選後想只加可見數據，用SUBTOTAL(9,範圍)",
                "SUBTOTAL 第一個參數9代表SUM",
              ],
              traps: ["篩選後用SUM還是算全部數字", "隱藏列SUBTOTAL一樣忽略"],
              ex: {
                desc: "篩選後只加可見行",
                formula: "=SUBTOTAL(9,B2:B10)",
                result: "只計算篩選後可見的總和",
                table: {
                  cols: ["項目", "金額", "狀態"],
                  rows: [
                    ["銷售A", "10000", "顯示"],
                    ["銷售B", "8000", "隱藏"],
                    ["銷售C", "12000", "顯示"],
                    ["SUM結果", "30000", "全算"],
                    ["SUBTOTAL結果", "22000", "只算可見"],
                  ],
                },
              },
              keys: [
                "日常求和用SUM",
                "篩選後統計用SUBTOTAL(9,...)",
                "SUM vs 加號差在對文字的處理",
              ],
            },
            {
              id: "2.2",
              title: "SUMIF 單條件求和",
              funcs: ["SUMIF"],
              tagline:
                "SUMIF 是「只要蘋果」的求和——SUM是全都要，SUMIF是只挑合格的加。",
              syntax: "=SUMIF( 條件範圍, 條件, [求和範圍] )",
              points: [
                "第1參數：判斷條件的區域（條件列）",
                "第2參數：要符合的條件",
                "第3參數：實際要加總的區域（可省略）",
                "條件可以是文字、數字、邏輯符號",
              ],
              traps: [
                '邏輯符號要加雙引號，例如">0"',
                "條件和求和範圍行數要一致",
              ],
              ex: {
                desc: "計算銷售部的總薪資",
                formula: '=SUMIF(A:A,"銷售部",C:C)',
                result: "75000",
                table: {
                  cols: ["A(部門)", "B(姓名)", "C(薪資)"],
                  rows: [
                    ["銷售部", "張三", "25000"],
                    ["人事部", "李四", "22000"],
                    ["銷售部", "王五", "28000"],
                    ["銷售部", "趙六", "22000"],
                    ["結果", "", "→ 75000"],
                  ],
                },
              },
              keys: [
                '條件文字加雙引號："銷售部"',
                '邏輯條件也加引號：">5000"',
                "條件和求和是同一列時第3參數可省",
              ],
            },
            {
              id: "2.3",
              title: "SUMIFS 多條件求和進階",
              funcs: ["SUMIFS"],
              tagline:
                "SUMIFS 是SUMIF的升級版——可以同時設多個篩選條件，「既要…又要…」場景必用。",
              syntax:
                "=SUMIFS( 求和範圍, 條件範圍1, 條件1, 條件範圍2, 條件2, ... )",
              points: [
                "注意！SUMIFS 的求和範圍在第一個",
                "可以設定任意多個條件（AND邏輯）",
                '排除特定項用 "<>某部門"',
                '統計空白用 "="，非空白用 "<>"',
              ],
              traps: [
                "SUMIF 和 SUMIFS 參數順序不同，SUMIFS求和在前！",
                "所有條件範圍行數要一致",
              ],
              ex: {
                desc: "計算銷售部+3月的業績",
                formula: '=SUMIFS(C:C,A:A,"銷售部",B:B,"3月")',
                result: "48000",
                table: {
                  cols: ["A(部門)", "B(月份)", "C(業績)"],
                  rows: [
                    ["銷售部", "3月", "28000"],
                    ["人事部", "3月", "18000"],
                    ["銷售部", "3月", "20000"],
                    ["銷售部", "4月", "30000"],
                    ["→ 結果", "", "48000"],
                  ],
                },
              },
              keys: [
                "SUMIFS 求和範圍在最前面（跟SUMIF相反）",
                "多條件是AND關係（全部滿足才算）",
                '排除法用 "<>" 符號',
              ],
            },
            {
              id: "2.4",
              title: "COUNT 家族：計數的三兄弟",
              funcs: ["COUNT", "COUNTA", "COUNTBLANK"],
              tagline:
                "COUNT家族像不同的點名冊：COUNT只認數字、COUNTA只要有內容都算、COUNTBLANK專找空位。",
              syntax:
                "=COUNT(範圍)     → 只數數字\n=COUNTA(範圍)   → 非空儲存格\n=COUNTBLANK(範圍)→ 空儲存格",
              points: [
                "COUNT：驗鈔機，只認真正的數字格式",
                "COUNTA：點名冊，有任何內容就算",
                "COUNTBLANK：摸魚俠偵測器，找空位",
                "日常計算數量用COUNTA最安全",
              ],
              traps: [
                "文字格式的數字COUNT不會算進去",
                "COUNTA不能分辨空格（有空格的儲存格不是空的）",
              ],
              ex: {
                desc: "計算有幾個員工填了考核分數",
                formula: "=COUNT(B2:B10)",
                result: "6（只有6個填了數字）",
                table: {
                  cols: ["姓名", "考核分數"],
                  rows: [
                    ["張三", "85"],
                    ["李四", "(空)"],
                    ["王五", "90"],
                    ["趙六", "待定（文字）"],
                    ["陳七", "78"],
                    ["結果", "COUNT=3, COUNTA=4"],
                  ],
                },
              },
              keys: [
                "數字統計用COUNT",
                "任何非空內容用COUNTA",
                "找空格用COUNTBLANK",
              ],
            },
            {
              id: "2.5",
              title: "COUNTIF / COUNTIFS 條件計數",
              funcs: ["COUNTIF", "COUNTIFS"],
              tagline:
                "COUNTIF是「門衛大爺」——只讓符合標準的人進門並計數。COUNTIFS是雙重門衛。",
              syntax:
                "=COUNTIF( 條件範圍, 條件 )\n=COUNTIFS( 條件範圍1, 條件1, 條件範圍2, 條件2 )",
              points: [
                '統計某部門有幾人：COUNTIF(A:A,"銷售部")',
                '統計及格人數：COUNTIF(B:B,">=60")',
                "COUNTIFS多條件AND邏輯",
                "可以用萬用字元：* 代表任意文字",
              ],
              traps: [
                "COUNTIF只能一個條件，多條件必須用COUNTIFS",
                "條件用萬用字元要加雙引號",
              ],
              ex: {
                desc: "計算銷售部工齡>3年的員工",
                formula: '=COUNTIFS(A:A,"銷售部",B:B,">3")',
                result: "2",
                table: {
                  cols: ["A(部門)", "B(工齡)"],
                  rows: [
                    ["銷售部", "5"],
                    ["人事部", "3"],
                    ["銷售部", "4"],
                    ["銷售部", "1"],
                    ["→ 結果", "2人"],
                  ],
                },
              },
              keys: [
                "單條件用COUNTIF，多條件用COUNTIFS",
                '數字條件記得加引號：">3"',
                "萬用字元：* 任意，? 一個字元",
              ],
            },
            {
              id: "2.6",
              title: "AVERAGE / AVERAGEIFS / SUMPRODUCT",
              funcs: ["AVERAGE", "AVERAGEIFS", "SUMPRODUCT"],
              tagline:
                "AVERAGE是「削峰填谷」的平均機，SUMPRODUCT是隱藏的乘積計算神器。",
              syntax:
                "=AVERAGE(範圍)\n=AVERAGEIFS(平均範圍, 條件範圍1, 條件1, ...)\n=SUMPRODUCT(數組1, 數組2)",
              points: [
                "AVERAGE直接算平均值（自動忽略空儲存格）",
                "AVERAGEIFS多條件平均，參數結構同SUMIFS",
                "SUMPRODUCT對應元素相乘後求和",
                "SUMPRODUCT可替代許多複雜的條件計算",
              ],
              traps: [
                "AVERAGE和COUNT一樣不計入文字格式數字",
                "SUMPRODUCT的數組必須行數一致",
              ],
              ex: {
                desc: "計算加權平均成績",
                formula: "=SUMPRODUCT(B2:B4,C2:C4)/SUM(C2:C4)",
                result: "82.5",
                table: {
                  cols: ["科目", "成績", "權重"],
                  rows: [
                    ["數學", "85", "40%"],
                    ["英文", "80", "30%"],
                    ["國文", "79", "30%"],
                    ["加權平均", "", "82.5"],
                  ],
                },
              },
              keys: [
                "多條件平均用AVERAGEIFS（結構同SUMIFS）",
                "SUMPRODUCT=各項相乘後加總",
                "SUMPRODUCT可以做條件計算：=SUMPRODUCT((條件)*值)",
              ],
            },
          ],
        },
        {
          id: 3,
          emoji: "🔍",
          title: "查找匹配：從 VLOOKUP 到 INDEX+MATCH",
          subtitle: "數據比對查詢的終極武器",
          level: "基礎",
          lvIdx: 1,
          color: "#78350f",
          bg: "#fef9c3",
          chipCls: "c3",
          funcs: [
            "VLOOKUP",
            "HLOOKUP",
            "XLOOKUP",
            "INDEX",
            "MATCH",
            "IFERROR",
            "IFNA",
          ],
          desc: "掌握Excel最重要的查找函數，從基礎VLOOKUP到進階INDEX+MATCH，讓數據匹配不再是難題。",
          lessons: [
            {
              id: "3.1",
              title: "VLOOKUP 全方位拆解",
              funcs: ["VLOOKUP"],
              tagline:
                "VLOOKUP像自動販賣機：告訴它要什麼（查找值），在哪找（區域），取第幾格（列號），精不精確（0）。",
              syntax: "=VLOOKUP( 找誰, 在哪裡找, 第幾列, 0 )",
              points: [
                "第4參數永遠填0（精確匹配）！99%情況都用0",
                "查找值必須在查找區域的第1列",
                "只能從左往右找（重要限制！）",
                "返回結果是查找區域的第N列",
              ],
              traps: [
                "忘記填第4參數0，會用模糊匹配出錯",
                "查找值在右邊時無法向左找",
                "格式不一致（文字vs數字）導致#N/A",
              ],
              ex: {
                desc: "根據飲品名查價格",
                formula: '=VLOOKUP("拿鐵",A:C,3,0)',
                result: "25",
                table: {
                  cols: ["A(飲品)", "B(杯型)", "C(價格)"],
                  rows: [
                    ["美式", "中杯", "20"],
                    ["拿鐵", "大杯", "25"],
                    ["摩卡", "超大杯", "30"],
                    ["→查拿鐵", "", "→ 25"],
                  ],
                },
              },
              keys: [
                "口訣：找誰，在哪找，第幾列，要精確(0)",
                "第4參數一定填0避免模糊匹配錯誤",
                "只能向右找，想向左找改用XLOOKUP",
              ],
            },
            {
              id: "3.2",
              title: "VLOOKUP 跨表引用與#N/A 排查",
              funcs: ["VLOOKUP"],
              tagline:
                "跨工作表用 Sheet名稱! 引用，遇到#N/A先查格式再查數據是否存在。",
              syntax:
                "=VLOOKUP(A2, Sheet2!A:B, 2, 0)\n=VLOOKUP(A2, '工號對照表'!A:C, 2, 0)",
              points: [
                "跨表引用格式：工作表名稱!儲存格範圍",
                "工作表名稱有空格要加單引號",
                "#N/A排查清單：1.格式是否一致 2.有無多餘空格 3.數據是否存在",
                "TRIM()去除多餘空格再查找",
              ],
              traps: [
                "工作表名稱改變後要更新引用",

              title: "函數嵌套進階：複雜需求的拆解思維",
              funcs: ["INDEX", "MATCH", "IFERROR", "SUMPRODUCT"],
              tagline:
                "複雜公式的本質是函數組合。掌握「從外到內、先拆後組、小步驗證」的思維，任何公式都能拿下。",
              syntax:
                "複雜公式 = 簡單函數1( 簡單函數2( 簡單函數3(...) ) )\n步驟：識別需求→拆解步驟→逐步驗證→組合",
              points: [
                "第1步：識別最終目標是什麼（返回什麼）",
                "第2步：拆解成2-3個小步驟",
                "第3步：每個小步驟用一個函數",
                "第4步：驗證每個函數獨立正確",
                "第5步：從內向外組合",
                "第6步：最外層加IFERROR保護",
              ],
              traps: ["不要一次寫完再debug", "嵌套超過3層就考慮用輔助列"],
              ex: {
                desc: "查找並計算加權薪資",
                formula:
                  '=IFERROR(INDEX(薪資列,MATCH(查找值,姓名列,0))*SUMPRODUCT(...),"未找到")',
                result: "動態計算結果",
                table: {
                  cols: ["思維步驟", "說明"],
                  rows: [
                    ["1. 拆解", "把大需求拆成3步"],
                    ["2. 逐步", "每步獨立測試", ""],
                    ["3. 組合", "從內向外套", ""],
                    ["4. 保護", "外層加IFERROR", ""],
                  ],
                },
              },
              keys: [
                "複雜公式=簡單函數的嵌套組合",
                "從內向外：先寫最裡層，逐步向外擴",
                "最外層加IFERROR保護",
              ],
            },
          ],
        },
      ];

      const LEVEL_NAMES = ["入門", "基礎", "進階", "高階"];
      const LEVEL_STYLES = ["lv-0", "lv-1", "lv-2", "lv-3"];

      const state = {
        currentView: "home",
        currentModule: 0,
        currentLesson: 0,
        flatLessons: [],
      };

      function buildFlatLessons() {
        state.flatLessons = [];
        MODULES.forEach((m, mi) => {
          m.lessons.forEach((l, li) => {
            state.flatLessons.push({
              moduleIdx: mi,
              lessonIdx: li,
              mod: m,
              lesson: l,
            });
          });
        });
      }

      function showView(name) {
        document
          .querySelectorAll(".view")
          .forEach((v) => v.classList.remove("active"));
        document.getElementById("view-" + name).classList.add("active");
        state.currentView = name;
        window.scrollTo(0, 0);
        updateBreadcrumb();
      }

      function updateBreadcrumb() {
        const bc = document.getElementById("breadcrumb");
        if (state.currentView === "home") {
          bc.innerHTML = "";
          return;
        }
        const mod = MODULES[state.currentModule];
        let html = `<span class="crumb" onclick="goHome()">首頁</span><span class="sep">›</span>`;
        if (state.currentView === "module") {
          html += `<span class="current">M${mod.id} ${mod.title.split("：")[0]}</span>`;
        } else {
          html += `<span class="crumb" onclick="goModule(${state.currentModule})">M${mod.id} ${mod.title.split("：")[0]}</span>`;
          html += `<span class="sep">›</span><span class="current">${mod.lessons[state.currentLesson].id} ${mod.lessons[state.currentLesson].title}</span>`;
        }
        bc.innerHTML = html;
      }

      function goHome() {
        showView("home");
      }

      function goModule(mi) {
        state.currentModule = mi;
        renderModuleView();
        showView("module");
      }

      function goCard(mi, li) {
        state.currentModule = mi;
        state.currentLesson = li;
        renderCardView();
        showView("card");
      }

      function navCard(dir) {
        const mod = MODULES[state.currentModule];
        const newLi = state.currentLesson + dir;
        if (newLi >= 0 && newLi < mod.lessons.length) {
          state.currentLesson = newLi;
          renderCardView();
          window.scrollTo(0, 0);
        }
      }

      // ========== RENDER HOME ==========
      function renderHome() {
        const grid = document.getElementById("mod-grid");
        grid.innerHTML = MODULES.map(
          (m, i) => `
    <div class="mod-card" onclick="goModule(${i})">
      <div class="mod-card-head">
        <div class="mod-num ${m.chipCls}" style="width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px">${m.emoji}</div>
        <div class="mod-info">
          <div class="mod-title">M${m.id}. ${m.title}</div>
          <div class="mod-sub">${m.lessons.length} 堂課 · ${m.subtitle}</div>
        </div>
        <div class="mod-right">
          <span class="level-badge ${LEVEL_STYLES[m.lvIdx]}">${m.level}</span>
          <span class="mod-arrow">→</span>
        </div>
      </div>
      ${
        m.funcs.length > 0
          ? `<div class="func-preview">${m.funcs
              .slice(0, 8)
              .map((f) => `<span class="func-chip ${m.chipCls}">${f}</span>`)
              .join(
                "",
              )}${m.funcs.length > 8 ? `<span style="font-size:11px;color:var(--muted)">+${m.funcs.length - 8}個</span>` : ""}</div>`
          : ""
      }
    </div>
  `,
        ).join("");
      }

      // ========== RENDER MODULE ==========
      function renderModuleView() {
        const m = MODULES[state.currentModule];
        document.getElementById("mod-hero").innerHTML = `
    <div class="mod-hero-inner">
      <div class="mod-icon-big ${m.chipCls}" style="font-size:26px">${m.emoji}</div>
      <div style="flex:1">
        <h2>M${m.id}. ${m.title}</h2>
        <p class="desc" style="margin-top:6px">${m.desc}</p>
        <div class="mod-meta-pills">
          <span class="pill">${m.level}</span>
          <span class="pill">${m.lessons.length} 堂課</span>
          ${m.funcs.length > 0 ? `<span class="pill">${m.funcs.length} 個函數</span>` : ""}
        </div>
      </div>
    </div>`;
        document.getElementById("lesson-list").innerHTML = m.lessons
          .map(
            (l, li) => `
    <div class="lesson-row" id="lr-${li}">
      <div class="lesson-head" onclick="toggleLesson(${li})">
        <div class="lesson-num-badge ${m.chipCls}">${l.id}</div>
        <div class="lesson-title-wrap">
          <div class="lesson-title">${l.title}</div>
          ${l.funcs.length > 0 ? `<div class="lesson-funcs-row">${l.funcs.map((f) => `<span class="lesson-func-tag ${m.chipCls}">${f}</span>`).join("")}</div>` : ""}
        </div>
        <span class="lesson-expand-icon">▾</span>
      </div>
      <div class="lesson-body">
        <div class="plan-grid">
          <div class="plan-cell">
            <h5>核心重點</h5>
            <ul>${l.points.map((p) => `<li>${p}</li>`).join("")}</ul>
          </div>
          <div class="plan-cell">
            <h5>常見陷阱</h5>
            <ul>${l.traps.map((t) => `<li>${t}</li>`).join("")}</ul>
          </div>
          <div class="plan-cell wide">
            <h5>一句話理解</h5>
            <p style="font-size:13px;color:var(--text);line-height:1.6">${l.tagline}</p>
            <span class="formula-display">${l.syntax.replace(/\n/g, "<br>")}</span>
          </div>
        </div>
        <button class="view-card-btn" onclick="goCard(${state.currentModule},${li})">
          查看教學卡片 →
        </button>
      </div>
    </div>`,
          )
          .join("");
      }

      function toggleLesson(li) {
        const row = document.getElementById("lr-" + li);
        row.classList.toggle("open");
      }

      // ========== RENDER CARD ==========
      function renderCardView() {
        const mod = MODULES[state.currentModule];
        const l = mod.lessons[state.currentLesson];
        const total = mod.lessons.length;
        const prog = Math.round(((state.currentLesson + 1) / total) * 100);

        document.getElementById("progress-label").textContent =
          `M${mod.id} · ${mod.emoji} ${mod.title.split("：")[0]}`;
        document.getElementById("progress-fill").style.width = prog + "%";
        document.getElementById("progress-count").textContent =
          `${state.currentLesson + 1} / ${total}`;
        document.getElementById("btn-prev").disabled =
          state.currentLesson === 0;
        document.getElementById("btn-next").disabled =
          state.currentLesson === total - 1;

        const ex = l.ex;
        const tableHtml = ex.table
          ? `
    <table class="example-table">
      <tr>${ex.table.cols.map((c) => `<th>${c}</th>`).join("")}</tr>
      ${ex.table.rows.map((r, ri) => `<tr>${r.map((c, ci) => `<td class="${ri === ex.table.rows.length - 1 || c.startsWith("→") ? "highlight-cell" : ""}">${c}</td>`).join("")}</tr>`).join("")}
    </table>`
          : "";

        document.getElementById("teaching-card").innerHTML = `
    <div class="card-header" style="background:linear-gradient(135deg,${mod.color} 0%,${mod.color}cc 100%)">
      <div class="card-header-top">
        <span class="card-lesson-id" style="color:rgba(255,255,255,0.8)">${l.id}</span>
        <span class="card-level-tag">${mod.level}</span>
        <span style="font-size:20px">${mod.emoji}</span>
      </div>
      <div class="card-func-name">${l.funcs.length > 0 ? l.funcs[0] : l.title.split(" ")[0]}</div>
      <div class="card-func-subtitle">${l.title}</div>
    </div>
    <div class="card-body">
      <div class="card-section">
        <div class="card-section-label"><span>💡</span> 一句話理解</div>
        <div class="tagline-box"><p>${l.tagline}</p></div>
      </div>
      <div class="card-section">
        <div class="card-section-label"><span>📐</span> 語法</div>
        <div class="syntax-box">${l.syntax.replace(/\n/g, "<br>").replace(/（.+?）/g, (s) => `<span class="param">${s}</span>`)}</div>
      </div>
      ${
        tableHtml || ex.formula
          ? `
      <div class="card-section">
        <div class="card-section-label"><span>📊</span> 實戰範例</div>
        <p style="font-size:13px;color:var(--muted);margin-bottom:10px">${ex.desc}</p>
        ${tableHtml}
        <div class="formula-result">
          <span class="formula-code">${ex.formula.split("\n")[0]}</span>
          ${ex.result ? `<span class="formula-arrow">→</span><span class="formula-val">${ex.result}</span>` : ""}
        </div>
      </div>`
          : ""
      }
      <div class="card-section">
        <div class="card-section-label"><span>📌</span> 核心重點</div>
        <div class="tips-grid">
          <div class="tip-box good">
            <h6>✅ 關鍵記憶</h6>
            <ul>${l.keys.map((k) => `<li>${k}</li>`).join("")}</ul>
          </div>
          <div class="tip-box bad">
            <h6>⚠️ 常見陷阱</h6>
            <ul>${l.traps.map((t) => `<li>${t}</li>`).join("")}</ul>
          </div>
        </div>
      </div>
    </div>`;
      }

      // INIT
      buildFlatLessons();
      renderHome();
    </script>
  </body>
</html>
